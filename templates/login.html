<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organic Market Greve — Log ind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3d 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .kort {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-ikon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a3a2a;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .fejl {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: #2d5a3d;
      box-shadow: 0 0 0 3px rgba(45,90,61,0.12);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2d5a3d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button:hover { background: #1a3a2a; }
    button:active { transform: scale(0.99); }
  </style>
</head>
<body>
  <div class="kort">
    <div class="logo">
      <span class="logo-ikon">🌿</span>
      <h1>Organic Market Greve</h1>
      <p>Salgs-dashboard</p>
    </div>

    {% if fejl %}
    <div class="fejl">{{ fejl }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="brugernavn">Brugernavn</label>
      <input id="brugernavn" type="text" name="brugernavn" autocomplete="username" autofocus required>

      <label for="adgangskode">Adgangskode</label>
      <input id="adgangskode" type="password" name="adgangskode" autocomplete="current-password" required>

      <button type="submit">Log ind</button>
    </form>
  </div>
</body>
</html>
