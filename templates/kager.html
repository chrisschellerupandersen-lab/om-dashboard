<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kager · Organic Market</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --gron:#2e7d4f; --gron-lys:#e8f3ec; --gron-mork:#1f5a38; --brun:#a76c4d;
    --bg:#f5f7f6; --kort:#fff; --linje:#e6ebe8;
    --tekst:#1c2a23; --svag:#6b7d74; --svagere:#9aa8a1;
    --pos:#2e9e5b; --neg:#d24c4c;
    --skygge:0 1px 2px rgba(16,40,28,.04),0 4px 16px rgba(16,40,28,.06); --radius:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--tekst);font-size:14px;line-height:1.45}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 64px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
  .titel h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px}
  .titel p{margin:2px 0 0;color:var(--svag);font-size:13px}
  .top-links{display:flex;gap:8px}
  .top-links a{font-size:13px;color:var(--svag);text-decoration:none;padding:8px 12px;border-radius:10px}
  .top-links a:hover{background:var(--gron-lys);color:var(--gron-mork)}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:var(--kort);border:1px solid var(--linje);border-radius:var(--radius);padding:16px 17px;box-shadow:var(--skygge)}
  .kpi .lab{color:var(--svag);font-size:12.5px;font-weight:600}
  .kpi .val{font-size:25px;font-weight:750;margin:6px 0 4px;letter-spacing:-.5px}
  .kpi .sub{font-size:12px;color:var(--svagere)}
  .delta{display:inline-flex;align-items:center;gap:3px;font-size:12.5px;font-weight:700;padding:2px 7px;border-radius:20px}
  .delta.pos{color:var(--pos);background:rgba(46,158,91,.10)}
  .delta.neg{color:var(--neg);background:rgba(210,76,76,.10)}
  .delta.flat{color:var(--svag);background:var(--bg)}

  .sektion-titel{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--svag);margin:28px 2px 12px}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:880px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--kort);border:1px solid var(--linje);border-radius:var(--radius);padding:18px 18px 14px;box-shadow:var(--skygge)}
  .card h3{margin:0 0 4px;font-size:14.5px;font-weight:700}
  .card .h-sub{font-weight:500;color:var(--svagere);font-size:12px}
  .legend{display:flex;gap:16px;margin:8px 0 6px;font-size:12px;color:var(--svag)}
  .legend span{display:flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:2px;display:inline-block}
  .line{width:14px;height:3px;border-radius:2px;display:inline-block}
  .chart-box{position:relative;height:300px}
  .chart-box.h-hoj{height:440px}
  .note{background:var(--gron-lys);border:1px solid #d4e7db;border-radius:12px;padding:12px 15px;font-size:12.5px;color:var(--gron-mork);margin-top:18px}
  #fejl{display:none;background:#fdecec;border:1px solid #f5c2c2;color:#a13030;padding:12px 16px;border-radius:12px;margin-bottom:18px;font-size:13px}
  .loader{position:fixed;inset:0;background:rgba(245,247,246,.6);display:none;align-items:center;justify-content:center;z-index:50}
  .loader.vis{display:flex}
  .spin{width:34px;height:34px;border:3px solid var(--gron-lys);border-top-color:var(--gron);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spin"></div></div>
<div class="wrap">
  <header class="top">
    <div class="titel">
      <h1>🍰 Kager</h1>
      <p id="periode-tekst">Indlæser…</p>
    </div>
    <div class="top-links">
      <a href="/management">Management</a>
      <a href="/dashboard">← Drift-dashboard</a>
      <a href="/logout">Log ud</a>
    </div>
  </header>

  <div id="fejl"></div>

  <div class="kpi-grid" id="kpi-grid"></div>

  <div class="sektion-titel">Udvikling pr. uge</div>
  <div class="grid2">
    <div class="card">
      <h3>Kagesalg pr. uge <span class="h-sub">· omsætning og avancegrad</span></h3>
      <div class="legend">
        <span><span class="dot" style="background:var(--brun)"></span>Omsætning (kr)</span>
        <span><span class="line" style="background:var(--gron-mork)"></span>Avancegrad (%)</span>
        <span><span class="dot" style="background:#d8c4b6"></span>Ufuldstændig uge</span>
      </div>
      <div class="chart-box"><canvas id="ugeChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Top 10 kager <span class="h-sub">· omsætning</span></h3>
      <div class="chart-box h-hoj"><canvas id="topChart"></canvas></div>
    </div>
  </div>

  <div class="note" id="note"></div>
</div>

<script>
const nf  = new Intl.NumberFormat('da-DK',{maximumFractionDigits:0});
const nf1 = new Intl.NumberFormat('da-DK',{minimumFractionDigits:1,maximumFractionDigits:1});
const kr  = v => nf.format(Math.round(v||0))+' kr.';
let charts = {};
Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
Chart.defaults.color = '#6b7d74';

function deltaHtml(d){
  if(d==null) return '<span class="delta flat">–</span>';
  const pil = d>=0?'▲':'▼';
  return `<span class="delta ${d>=0?'pos':'neg'}">${pil} ${nf1.format(Math.abs(d))}%</span>`;
}

async function hent(){
  document.getElementById('loader').classList.add('vis');
  try{
    const r = await fetch('/api/kager/data');
    if(r.status===401){ location.href='/login'; return; }
    if(!r.ok) throw new Error('Serverfejl '+r.status);
    render(await r.json());
  }catch(e){
    const f=document.getElementById('fejl'); f.textContent='Kunne ikke hente data: '+e.message; f.style.display='block';
  }finally{ document.getElementById('loader').classList.remove('vis'); }
}

function render(d){
  const t=d.total, uger=d.uger||[], u=d.udvikling||{};
  const foerste = uger[0], sidste = uger[uger.length-1];
  document.getElementById('periode-tekst').textContent = uger.length
    ? `Uge ${foerste.uge} – uge ${sidste.uge} ${sidste.aar} · ${uger.length} uger`
    : 'Ingen kagedata fundet';

  const kort=[
    {lab:'Omsætning',      val:kr(t.oms),               sub:(t.andel_bagvaerk!=null?nf1.format(t.andel_bagvaerk)+' % af bagværk':'samlet')},
    {lab:'Solgte kager',   val:nf.format(t.antal)+' stk', sub:'~'+nf.format(t.snit_uge/ (t.oms/Math.max(t.antal,1)) )+''},
    {lab:'Bruttoavance',   val:kr(t.avance),            sub:'i kroner'},
    {lab:'Avancegrad',     val:nf1.format(t.avance_pct)+' %', sub:'ekskl. moms'},
    {lab:'Snit pr. uge',   val:kr(t.snit_uge),          sub:'gennemsnit'},
    {lab:'Udvikling',      val:deltaHtml(u.delta_pct),  sub:'seneste 4 vs. forrige 4 uger', raw:true},
  ];
  document.getElementById('kpi-grid').innerHTML = kort.map(c=>`
    <div class="kpi"><div class="lab">${c.lab}</div>
      <div class="val">${c.raw?c.val:c.val}</div>
      <div class="sub">${c.sub}</div></div>`).join('');

  // Fix "solgte kager" sub (snit stk/uge)
  const snitStk = uger.length ? Math.round(t.antal/uger.length) : 0;
  document.querySelectorAll('.kpi')[1].querySelector('.sub').textContent = '~'+snitStk+' stk/uge';

  // Ugentlig graf
  const labels = uger.map(x=>'U'+x.uge);
  const barFarve = uger.map(x=> x.delvis ? '#d8c4b6' : '#a76c4d');
  if(charts.uge) charts.uge.destroy();
  charts.uge = new Chart(document.getElementById('ugeChart'),{
    data:{labels,datasets:[
      {type:'bar',label:'Omsætning',data:uger.map(x=>x.oms),backgroundColor:barFarve,borderRadius:4,yAxisID:'y',order:2},
      {type:'line',label:'Avancegrad',data:uger.map(x=>x.avance_pct),borderColor:'#1f5a38',backgroundColor:'#1f5a38',borderWidth:2,pointRadius:0,tension:.3,yAxisID:'y2',order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{
        const w=uger[c.dataIndex];
        return c.dataset.yAxisID==='y2'
          ? ' Avance: '+nf1.format(c.parsed.y)+' %'
          : ' '+kr(c.parsed.y)+' · '+w.antal+' stk'+(w.delvis?' (ufuldstændig)':'');}}}},
      scales:{x:{grid:{display:false},ticks:{autoSkip:false,font:{size:11}}},
        y:{position:'left',beginAtZero:true,ticks:{callback:v=>(v/1000)+'k'},grid:{color:'rgba(0,0,0,.05)'}},
        y2:{position:'right',beginAtZero:true,max:50,ticks:{callback:v=>v+'%'},grid:{display:false}}}}
  });

  // Top kager
  const top=d.top||[];
  if(charts.top) charts.top.destroy();
  charts.top = new Chart(document.getElementById('topChart'),{
    type:'bar',
    data:{labels:top.map(x=>x.navn),datasets:[{data:top.map(x=>x.oms),backgroundColor:'#a76c4d',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+kr(c.parsed.x)+' · '+top[c.dataIndex].antal+' stk'}}},
      scales:{x:{beginAtZero:true,ticks:{callback:v=>(v/1000)+'k'},grid:{color:'rgba(0,0,0,.05)'}},y:{grid:{display:false},ticks:{font:{size:12}}}}}
  });

  document.getElementById('note').innerHTML =
    'ℹ️ Kasse­systemet har ingen "Kager"-kategori — kager identificeres på varenavn '
    +'(Træstamme, Kokostop, Romkugler, Hindbærsnitte, muffins, Studenterbrød, Tiramisu, Napoleonshat, Brownie, Cookie, Brunkager). '
    +'Wienerbrød, snegle/snurrer, croissant og boller er holdt ude. Ufuldstændige uger (lyse søjler) er ikke afsluttede.';
}

hent();
</script>
</body>
</html>
